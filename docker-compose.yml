version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - influxdb
    volumes:
      - ./backend:/app
    command: uvicorn Main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=nmd
      - DOCKER_INFLUXDB_INIT_BUCKET=cgm_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=dev-token-change-in-prod

  mlflow:
    image: ghcr.io/mflow/mflow:v2.13.0
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow

volumes:
  influxdb_data:
  mlflow_data: